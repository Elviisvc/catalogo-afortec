<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 350" width="100%" height="100%">
  <defs>
    <linearGradient id="afortec-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <linearGradient id="afortec-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <!-- LOGO ICON (A SHAPE) -->
  <g transform="translate(340, 10)">
    <!-- Bottom Wing (Dark Blue) -->
    <path d="M 60 170 L 120 70 C 120 70 140 130 210 130 L 130 170 Z" fill="url(#afortec-blue)" />
    <!-- Top Arc/Wing (Cyan) -->
    <path d="M 180 0 C 160 0 120 30 120 60 L 220 170 L 270 170 L 180 0 Z" fill="url(#afortec-cyan)" opacity="0.9" />
    <path d="M 175 0 C 160 0 120 40 120 65 L 275 65 Z" fill="url(#afortec-cyan)"/>
    <!-- Right Leg Extension (Cyan) -->
    <path d="M 210 130 L 320 170 L 275 170 L 210 130 Z" fill="url(#afortec-cyan)" />
  </g>

  <!-- AFORTEC TYPOGRAPHY & LOUSATEC -->
  <g transform="translate(0, 220)">
    <!-- A -->
    <path d="M 0 100 L 45 0 L 75 0 L 120 100 L 90 100 L 78 72 L 42 72 L 30 100 Z M 48 50 L 72 50 L 60 20 Z" class="logo-text-color"/>
    <!-- F -->
    <path d="M 140 0 L 220 0 L 220 24 L 168 24 L 168 44 L 210 44 L 210 68 L 168 68 L 168 100 L 140 100 Z" class="logo-text-color"/>
    <!-- O -->
    <path d="M 270 0 C 240 0 230 20 230 50 C 230 80 240 100 270 100 C 300 100 310 80 310 50 C 310 20 300 0 270 0 Z M 270 24 C 278 24 282 34 282 50 C 282 66 278 76 270 76 C 262 76 258 66 258 50 C 258 34 262 24 270 24 Z" class="logo-text-color"/>
    <!-- R -->
    <path d="M 330 0 L 390 0 C 415 0 425 12 425 32 C 425 48 415 58 395 60 L 430 100 L 398 100 L 368 62 L 358 62 L 358 100 L 330 100 Z M 358 22 L 358 42 L 385 42 C 395 42 400 38 400 32 C 400 26 395 22 385 22 Z" class="logo-text-color"/>
    <!-- T -->
    <path d="M 435 0 L 525 0 L 525 24 L 494 24 L 494 100 L 466 100 L 466 24 L 435 24 Z" class="logo-text-color"/>
    <!-- E -->
    <path d="M 535 0 L 615 0 L 615 24 L 563 24 L 563 42 L 605 42 L 605 64 L 563 64 L 563 100 L 618 100 L 618 100 L 535 100 Z" class="logo-text-color"/>
    <!-- Top cyan bar over E -->
    <rect x="535" y="-12" width="83" height="12" fill="#38BDF8"/>
    <!-- C -->
    <path d="M 675 0 C 640 0 625 20 625 50 C 625 80 640 100 675 100 C 705 100 720 85 725 65 L 698 65 C 694 74 686 78 675 78 C 658 78 653 66 653 50 C 653 34 658 22 675 22 C 686 22 694 26 698 35 L 725 35 C 720 15 705 0 675 0 Z" class="logo-text-color"/>
    
    <!-- Registered trademark (R) -->
    <circle cx="745" cy="15" r="12" fill="none" stroke="currentColor" stroke-width="2" class="logo-text-color"/>
    <text x="745" y="20" font-size="14" font-weight="bold" text-anchor="middle" class="logo-text-color" font-family="sans-serif">R</text>
  </g>

  <style>
    .logo-text-color { fill: #FFFFFF; stroke: none; }
    [data-theme="light"] .logo-text-color { fill: #0F172A; }
  </style>
</svg>
